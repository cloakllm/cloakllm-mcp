name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# v0.6.1 H7: least-privilege defaults + cancel-on-superseding-push.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # v0.6.3 P0-1: upgrade pip before audit (runner pip 25.2 has known CVEs)
      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dependencies
        run: pip install -e . pytest pip-audit

      - name: Run tests
        run: pytest test_server.py -v

      # v0.6.3 NEW-9: dep CVE audit is now BLOCKING for the MCP repo too.
      # All exemptions tracked in SECURITY_WAIVERS.md.
      - name: Audit dependencies (pip-audit)
        run: |
          pip-audit \
            --ignore-vuln ECHO-ffe1-1d3c-d9bc \
            --ignore-vuln ECHO-7db2-03aa-5591

      # v0.6.5: Build the wheel and import it from a fresh venv against the
      # REAL upstream `mcp[cli]` package. This catches the class of regression
      # that broke v0.6.4 — when upstream `mcp` renamed
      # `FastMCP(description=...)` → `instructions=`, our `test_server.py`
      # mock (`_FakeFastMCP` accepting `**kwargs`) silently swallowed the
      # change and CI stayed green. Every fresh install of cloakllm-mcp 0.6.4
      # then crashed at import — required a 0.6.4.post1 hotfix.
      #
      # This step builds the wheel, installs it into a clean venv WITHOUT
      # any test mocks, and runs `import server`. If the upstream API drifts
      # again, the import-time TypeError surfaces here BEFORE we tag a release.
      - name: Build wheel + import-smoke against real upstream mcp[cli]
        run: |
          pip install --upgrade build
          python -m build --wheel
          python -m venv /tmp/wheel-test-venv
          /tmp/wheel-test-venv/bin/pip install --quiet --upgrade pip
          /tmp/wheel-test-venv/bin/pip install --quiet dist/cloakllm_mcp-*.whl
          # Import using the wheel's installed location (server.py is a
          # top-level py-module per pyproject.toml); confirm 7-tool surface.
          /tmp/wheel-test-venv/bin/python -c "
          import server
          # v0.6.5: original 7-tool surface
          assert callable(server.sanitize), 'sanitize missing'
          assert callable(server.sanitize_batch), 'sanitize_batch missing'
          assert callable(server.desanitize), 'desanitize missing'
          assert callable(server.desanitize_batch), 'desanitize_batch missing'
          assert callable(server.analyze), 'analyze missing'
          assert callable(server.analyze_batch), 'analyze_batch missing'
          assert callable(server.analyze_context_risk), 'analyze_context_risk missing'
          # v0.7.0: Article 4a bias-detection tools (added by v0.7.0; assertion
          # added in v0.7.1 -- the v0.7.0 install-smoke wasn't updated to check
          # them, audit-process gap caught by the v0.7.1 audit).
          assert callable(server.bias_detection_session_start), 'bias_detection_session_start missing'
          assert callable(server.bias_pseudonymise), 'bias_pseudonymise missing'
          assert callable(server.bias_detection_session_end), 'bias_detection_session_end missing'
          # v0.8.0: compliance reporting tool
          assert callable(server.generate_compliance_report), 'generate_compliance_report missing'
          # v0.8.1: externally-verifiable key provenance
          assert callable(server.get_key_manifest), 'get_key_manifest missing'
          # v0.8.2: confirm cloakllm[attestation] pulled pynacl through to MCP install
          # (this is the headline check for v0.8.2 -- the whole point of the
          # release is that fresh `pip install cloakllm-mcp` lands you in a
          # state where KeyManifest works out of the box, no manual extras dance).
          import nacl.signing  # noqa: F401 -- import IS the assertion
          # And confirm the v0.8.2 fail-hard guard does NOT fire when the
          # backend IS available (regression guard for the v0.8.2 logic).
          from cloakllm.attestation import _ed25519_backend_available
          assert _ed25519_backend_available(), 'Ed25519 backend not detected even though pynacl imported -- v0.8.2 helper broken'
          print('install-smoke: OK -- all 12 tools + Ed25519 backend (pynacl) importable')
          "
