name: Publish to PyPI

on:
  push:
    tags: ["v*"]

# v0.6.1 H7: scoped permissions + concurrency lock.
permissions:
  contents: read
  id-token: write  # set up for future OIDC trusted publishing

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      # TODO(v0.6.2): migrate to OIDC trusted publishing once the publisher
      # is configured on PyPI for `cloakllm-mcp`.
      - name: Publish to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
